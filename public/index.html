<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>ZEUS Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZEUS" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      :root {
        --bg-main: #000000;
        --bg-panel: #020617;
        --bg-sidebar: #020617;
        --bg-header: #020617;
        --bg-input: #020617;
        --text-primary: #e5e7eb;
        --text-muted: #9ca3af;
        --accent-blue: #2563eb;
        --accent-blue-glow: #3b82f6;
        --accent-green: #22c55e;
        --accent-red: #ef4444;
        --border-subtle: #1e293b;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-top: env(safe-area-inset-top, 0px);
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: stretch;
        min-height: 100vh;
        min-height: 100dvh;
        background: radial-gradient(circle at top, #020617 0, #000000 55%, #000000 100%);
        color: var(--text-primary);
        padding: 8px;
        overflow: auto;
      }

      #app-shell {
        width: 100%;
        max-width: 1200px;
        height: 100%;
        max-height: 720px;
        background: var(--bg-panel);
        border-radius: 18px;
        border: 1px solid rgba(37, 99, 235, 0.7);
        box-shadow: 0 0 20px rgba(37, 99, 235, 0.4), 0 0 60px rgba(37, 99, 235, 0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #login, #app { width: 100%; height: 100%; display: none; }
      #layout { display: flex; flex: 1; min-height: 0; }

      /* ---- SIDEBAR CONTATTI ---- */
      #contacts {
        width: 260px;
        background: linear-gradient(180deg, #020617 0%, #020617 70%, #030712 100%);
        border-right: 1px solid var(--border-subtle);
        padding: 10px;
        box-sizing: border-box;
        overflow-y: auto;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }

      #contacts-header {
        font-size: 16px; font-weight: 600; letter-spacing: 0.04em;
        margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px;
      }
      #contacts-header::before { content: "⚡"; color: var(--accent-blue-glow); text-shadow: 0 0 8px rgba(59,130,246,0.8); }
      #contacts-header span { text-transform: uppercase; flex: 1; }

      #contacts-subheader {
        display: flex; align-items: center; justify-content: space-between; margin: 0 0 8px 0;
      }
      #contacts-subheader h2 {
        font-size: 13px; margin: 0; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--text-muted);
      }

      #profile-btn {
        background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.5);
        border-radius: 999px; color: #93c5fd; font-size: 11px; padding: 2px 8px;
        cursor: pointer; transition: background 0.15s;
      }
      #profile-btn:hover { background: rgba(37,99,235,0.3); }

      #contacts-list { flex: 1; overflow-y: auto; }

      .contact {
        padding: 8px; border-radius: 8px; cursor: pointer;
        display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
        transition: background 0.15s ease, transform 0.1s ease;
      }
      .contact:hover { background: rgba(37,99,235,0.08); transform: translateY(-1px); }
      .contact.selected { background: rgba(37,99,235,0.15); box-shadow: 0 0 0 1px rgba(37,99,235,0.7); }

      .contact-avatar {
        width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
        flex-shrink: 0; background: #1e293b; border: 1px solid rgba(37,99,235,0.3);
      }
      .contact-avatar-placeholder {
        width: 34px; height: 34px; border-radius: 50%;
        background: linear-gradient(135deg, #1e3a5f, #2563eb);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 14px; font-weight: 700; color: #e5e7eb;
        flex-shrink: 0; border: 1px solid rgba(37,99,235,0.3);
      }

      .contact-info { flex: 1; min-width: 0; }
      .contact-name {
        font-size: 13px; font-weight: 500;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        display: flex; align-items: center; gap: 5px;
      }
      .contact-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
      .contact-email { display: block; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* ---- AREA CHAT ---- */
      #chat-area { flex: 1; display: flex; flex-direction: column; background: #020617; min-width: 0; min-height: 0; }

      #chat-placeholder {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: var(--text-muted); font-size: 14px; text-align: center;
        gap: 12px; padding: 20px;
      }
      #chat-placeholder .placeholder-icon { font-size: 48px; opacity: 0.4; }

      #chat-panel { display: none; flex-direction: column; flex: 1; min-height: 0; }

      #chat-header {
        padding: 8px 16px; background: #020617; font-size: 13px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      }

      #chat-header-avatar {
        width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
        background: #1e293b; border: 1px solid rgba(37,99,235,0.4);
        flex-shrink: 0; display: none;
      }

      #chat-back-btn { background: none; border: none; color: #60a5fa; font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
      #chat-title-text { flex: 1; color: var(--text-primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .icon-btn {
        border: none; border-radius: 999px; width: 34px; height: 34px;
        padding: 0; font-size: 18px; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center;
        color: #0b1120;
        box-shadow: 0 2px 0 rgba(15,23,42,0.9), 0 0 8px rgba(15,23,42,0.6);
        transition: transform 0.05s ease, filter 0.1s ease;
      }
      .icon-btn span { display: none; }
      .icon-btn:active { transform: translateY(2px); filter: brightness(0.9); }

      #audio-call-btn { background: radial-gradient(circle at 30% 0, #bbf7d0 0, #22c55e 45%, #15803d 100%); }
      #audio-call-btn::before { content: "📞"; }
      #video-call-btn { background: radial-gradient(circle at 30% 0, #fef9c3 0, #facc15 40%, #a16207 100%); }
      #video-call-btn::before { content: "🎥"; }

      /* ---- VIDEO AREA ---- */
      #video-area {
        display: none; padding: 10px 16px;
        border-bottom: 1px solid var(--border-subtle);
        background: radial-gradient(circle at top, #020617 0%, #000000 80%);
        align-items: center; justify-content: center; flex-shrink: 0;
      }
      #video-wrapper {
        position: relative; width: 100%; max-width: 640px; max-height: 360px;
        margin: 0 auto; background: #000; border-radius: 12px; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 0 1px rgba(37,99,235,0.7), 0 0 18px rgba(37,99,235,0.6);
      }
      #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; }
      #localVideo {
        position: absolute; bottom: 10px; right: 10px; width: 26%; max-width: 200px;
        aspect-ratio: 16/9; border-radius: 10px;
        border: 1px solid rgba(148,163,184,0.8); object-fit: cover; background: #000;
      }

      /* ---- MESSAGGI ---- */
      #chat {
        flex: 1; overflow-y: auto; padding: 12px 16px 10px;
        box-sizing: border-box;
        background: radial-gradient(circle at top right, #020617 0%, #020617 30%, #000000 90%);
        min-height: 0;
      }

      .msg { margin-bottom: 8px; font-size: 13px; display: flex; flex-direction: column; }
      .msg-bubble {
        display: inline-block; padding: 7px 12px; border-radius: 14px;
        max-width: 80%; word-break: break-word; line-height: 1.4;
      }
      .msg-time {
        font-size: 10px; color: var(--text-muted); margin-top: 2px;
        padding: 0 4px;
      }

      .from-me { align-items: flex-end; }
      .from-me .msg-bubble { background: rgba(37,99,235,0.25); color: #bfdbfe; border-bottom-right-radius: 4px; }
      .from-me .msg-time { text-align: right; }

      .from-other { align-items: flex-start; }
      .from-other .msg-bubble { background: rgba(30,41,59,0.8); color: #e5e7eb; border-bottom-left-radius: 4px; }

      .msg-sender { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; padding: 0 4px; }

      /* ---- TYPING INDICATOR ---- */
      #typing-indicator {
        font-size: 12px; color: #60a5fa; padding: 2px 16px 4px;
        min-height: 20px; font-style: italic; flex-shrink: 0;
      }

      .video-bubble {
        width: 120px; height: 120px; border-radius: 50%; overflow: hidden;
        display: inline-flex; align-items: center; justify-content: center;
        background: #020617; box-shadow: 0 0 0 2px rgba(59,130,246,0.6);
      }
      .video-bubble video { width: 100%; height: 100%; object-fit: cover; }

      /* ---- COMPOSER ---- */
      #composer {
        display: flex; padding: 10px 12px; gap: 8px;
        background: #020617; box-sizing: border-box;
        border-top: 1px solid var(--border-subtle); flex-shrink: 0;
        padding-bottom: calc(10px + var(--safe-bottom));
      }

      #input-bar {
        display: flex; gap: 8px; width: 100%; align-items: center;
        background: var(--bg-input); padding: 6px 8px; border-radius: 999px;
        box-shadow: inset 0 0 0 1px rgba(30,64,175,0.4);
      }

      #composer input[type="text"] {
        flex: 1; padding: 6px 8px; border-radius: 999px;
        border: none; outline: none; background: transparent;
        color: var(--text-primary); font-size: 13px;
      }
      #composer input[type="text"]::placeholder { color: var(--text-muted); }

      #composer button {
        padding: 6px 10px; border: none; border-radius: 999px;
        background: var(--accent-blue); color: white; cursor: pointer;
        font-size: 13px; display: inline-flex; align-items: center; gap: 4px;
        box-shadow: 0 0 10px rgba(37,99,235,0.6);
        transition: background 0.15s, transform 0.05s;
      }
      #composer button:hover { background: #1d4ed8; transform: translateY(-1px); }

      #attach-btn {
        width: 32px; height: 32px; border-radius: 999px; border: none;
        background: rgba(148,163,184,0.15); color: #e5e7eb; font-size: 17px;
        cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      }
      #attach-btn:hover { background: rgba(148,163,184,0.3); }

      #video-note-btn {
        width: 32px; height: 32px; border-radius: 999px; border: none;
        background: radial-gradient(circle at 30% 0, #fecaca 0, #ef4444 40%, #b91c1c 100%);
        color: #f9fafb; font-size: 18px; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center;
        box-shadow: 0 0 8px rgba(239,68,68,0.7);
      }
      #video-note-btn span { font-size: 16px; margin-left: 1px; }

      /* ---- LOGIN ---- */
      #login { display: flex; align-items: center; justify-content: center; }

      #login-box {
        background: radial-gradient(circle at top, #020617 0%, #000000 85%);
        padding: 24px 22px; border-radius: 16px; width: 320px;
        box-shadow: 0 0 25px rgba(15,23,42,0.9), 0 0 40px rgba(37,99,235,0.35);
        border: 1px solid rgba(37,99,235,0.8);
      }
      #login-box h1 { margin-top: 0; font-size: 18px; margin-bottom: 6px; letter-spacing: 0.06em; }
      #login-box h1::before { content: "⚡ "; color: var(--accent-blue-glow); }
      #login-box label { font-size: 13px; display: block; margin-top: 10px; color: var(--text-muted); }
      #login-box input {
        width: 100%; padding: 8px; margin-top: 4px; border-radius: 999px;
        border: 1px solid rgba(37,99,235,0.6); outline: none;
        background: #020617; color: var(--text-primary); font-size: 13px;
      }
      #login-box input:focus { box-shadow: 0 0 12px rgba(37,99,235,0.7); }
      #login-box button {
        margin-top: 18px; width: 100%; padding: 9px; border-radius: 999px;
        background: var(--accent-green); color: white; cursor: pointer;
        border: none; font-weight: 600; font-size: 14px;
        box-shadow: 0 0 12px rgba(34,197,94,0.7);
      }
      #login-box button:hover { background: #16a34a; }
      #error { color: #f97316; margin-top: 8px; font-size: 12px; }
      #info { color: #22c55e; margin-top: 6px; font-size: 12px; }

      /* ---- MODAL PROFILO ---- */
      #profile-modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.75); z-index: 1000;
        align-items: center; justify-content: center;
      }
      #profile-modal-overlay.open { display: flex; }

      #profile-modal {
        background: radial-gradient(circle at top, #020617 0%, #000000 90%);
        border: 1px solid rgba(37,99,235,0.7); border-radius: 16px;
        padding: 24px; width: 340px; max-width: 95vw;
        box-shadow: 0 0 30px rgba(37,99,235,0.4);
        display: flex; flex-direction: column; gap: 12px;
        max-height: 90vh; overflow-y: auto;
      }
      #profile-modal h2 { margin: 0; font-size: 16px; color: #e5e7eb; display: flex; align-items: center; gap: 8px; }
      #profile-modal h2::before { content: "👤"; }

      .profile-avatar-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }

      #profile-avatar-preview {
        width: 80px; height: 80px; border-radius: 50%;
        background: #1e293b; border: 2px solid rgba(37,99,235,0.6);
        display: flex; align-items: center; justify-content: center;
        font-size: 32px; color: #9ca3af; overflow: hidden;
      }
      #profile-avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

      #profile-avatar-upload-btn {
        font-size: 11px; padding: 4px 12px; border-radius: 999px;
        border: 1px solid rgba(37,99,235,0.5); background: rgba(37,99,235,0.1);
        color: #93c5fd; cursor: pointer;
      }

      .profile-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
      .profile-field input {
        width: 100%; padding: 7px 12px; border-radius: 999px;
        border: 1px solid rgba(37,99,235,0.4); background: #020617;
        color: var(--text-primary); font-size: 13px; outline: none;
      }
      .profile-field input:focus { box-shadow: 0 0 10px rgba(37,99,235,0.5); }
      .profile-field input[disabled] { opacity: 0.5; cursor: not-allowed; }

      #profile-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

      #profile-save-btn {
        padding: 7px 18px; border-radius: 999px; border: none;
        background: var(--accent-blue); color: white; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      #profile-cancel-btn {
        padding: 7px 14px; border-radius: 999px;
        border: 1px solid rgba(148,163,184,0.3);
        background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer;
      }

      /* ================================================================
         RESPONSIVE — TABLET (max 900px)
      ================================================================ */
      @media (max-width: 900px) {
        body { padding: 0; }
        #app-shell { max-width: 100%; max-height: none; height: 100dvh; border-radius: 0; border: none; }
        #layout { flex-direction: row; }
        #contacts { width: 220px; }
      }

      /* ================================================================
         RESPONSIVE — MOBILE (max 640px)
         Stile Telegram: sidebar a sinistra nascosta, chat a tutto schermo
      ================================================================ */
      @media (max-width: 640px) {
        body { padding: 0; }

        #app-shell {
          max-width: 100%;
          max-height: none;
          height: 100dvh;
          border-radius: 0;
          border: none;
          box-shadow: none;
        }

        #layout {
          flex-direction: row;
          height: 100%;
          position: relative;
          overflow: hidden;
        }

        /* Sidebar occupa tutto lo schermo su mobile */
        #contacts {
          position: absolute;
          top: 0; left: 0;
          width: 100%;
          height: 100%;
          z-index: 10;
          padding: 12px;
          padding-top: calc(12px + var(--safe-top));
          transition: transform 0.25s ease;
        }

        /* Quando la chat è aperta, la sidebar scivola fuori */
        #contacts.hidden-mobile {
          transform: translateX(-100%);
        }

        /* Chat panel occupa tutto lo schermo su mobile */
        #chat-area {
          position: absolute;
          top: 0; left: 0;
          width: 100%;
          height: 100%;
          z-index: 5;
          transform: translateX(100%);
          transition: transform 0.25s ease;
        }

        #chat-area.visible-mobile {
          transform: translateX(0);
        }

        #chat-panel {
          height: 100%;
        }

        #chat-header {
          padding-top: calc(8px + var(--safe-top));
        }

        /* Freccia indietro visibile su mobile */
        #chat-back-btn { display: inline-flex; }

        .icon-btn { width: 32px; height: 32px; font-size: 15px; }

        #video-wrapper { max-height: 220px; }

        .video-bubble { width: 90px; height: 90px; }

        #login-box { width: 92%; max-width: 360px; padding: 20px 18px; }

        .msg-bubble { max-width: 88%; }

        /* Composer fisso in basso con safe area iPhone */
        #composer {
          padding-bottom: calc(10px + var(--safe-bottom));
        }
      }

      /* ================================================================
         RESPONSIVE — PICCOLI TELEFONI (max 380px)
      ================================================================ */
      @media (max-width: 380px) {
        #chat-header { padding: 6px 8px; gap: 6px; }
        .icon-btn { width: 28px; height: 28px; font-size: 13px; }
        #composer { padding: 6px 8px; }
        #composer button { padding: 5px 8px; font-size: 12px; }
        .msg-bubble { font-size: 12px; padding: 6px 10px; }
      }
    </style>
  </head>
  <body>
    <div id="app-shell">

      <div id="login">
        <div id="login-box">
          <h1>ZEUS Entra</h1>
          <label for="name">Nome</label>
          <input id="name" type="text" placeholder="Il tuo nome" autocomplete="name" />
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="la-tua@email" autocomplete="email" />
          <button id="login-btn">Entra</button>
          <div id="info"></div>
          <div id="error"></div>
        </div>
      </div>

      <div id="app">
        <div id="layout">

          <div id="contacts">
            <div id="contacts-header"><span>ZEUS CHAT</span></div>
            <div id="contacts-subheader">
              <h2>Contatti</h2>
              <button id="profile-btn">👤 Profilo</button>
            </div>
            <div id="contacts-list"></div>
          </div>

          <div id="chat-area">

            <div id="chat-placeholder">
              <div class="placeholder-icon">💬</div>
              <div>Seleziona un contatto per iniziare una chat</div>
            </div>

            <div id="chat-panel">
              <div id="chat-header">
                <button id="chat-back-btn" title="Torna alla rubrica">←</button>
                <img id="chat-header-avatar" src="" alt="" />
                <span id="chat-title-text">Chat</span>
                <button id="audio-call-btn" class="icon-btn"></button>
                <button id="video-call-btn" class="icon-btn"></button>
              </div>

              <div id="video-area">
                <div id="video-wrapper">
                  <video id="remoteVideo" autoplay playsinline></video>
                  <video id="localVideo" autoplay muted playsinline></video>
                </div>
              </div>

              <div id="chat"></div>

              <div id="typing-indicator"></div>

              <div id="composer">
                <div id="input-bar">
                  <button id="attach-btn" title="Invia allegato">📎</button>
                  <button id="video-note-btn" title="Registra video messaggio"><span>▶</span></button>
                  <input id="input" type="text" placeholder="Scrivi un messaggio..." autocomplete="off" />
                  <button id="send">Invia</button>
                </div>
                <input id="file-input" type="file" style="display:none" multiple />
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- MODAL PROFILO -->
    <div id="profile-modal-overlay">
      <div id="profile-modal">
        <h2>Il mio profilo</h2>
        <div class="profile-avatar-section">
          <div id="profile-avatar-preview">👤</div>
          <button id="profile-avatar-upload-btn">📷 Cambia foto</button>
          <input id="profile-avatar-input" type="file" accept="image/*" style="display:none" />
        </div>
        <div class="profile-field">
          <label>Nome</label>
          <input id="profile-name" type="text" placeholder="Il tuo nome" />
        </div>
        <div class="profile-field">
          <label>Email</label>
          <input id="profile-email" type="email" disabled />
        </div>
        <div class="profile-field">
          <label>Telefono</label>
          <input id="profile-phone" type="tel" placeholder="+39 ..." />
        </div>
        <div class="profile-field">
          <label>Indirizzo</label>
          <input id="profile-address" type="text" placeholder="Via, Città..." />
        </div>
        <div id="profile-modal-actions">
          <button id="profile-cancel-btn">Annulla</button>
          <button id="profile-save-btn">💾 Salva</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>

    <!-- PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('ZEUS SW registrato ✅'))
            .catch((err) => console.log('SW errore:', err));
        });
      }
    </script>
  </body>
</html>
